<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechAssistant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div>
        <span class="brand-name">TechAssistant</span>
        <span class="brand-tag">AI-Powered</span>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">MENU</div>
      <a href="#" class="nav-link active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        RAG 검색
      </a>
      <a href="#" class="nav-link disabled" title="API Key 필요">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        AI 답변 생성
        <span class="nav-badge">KEY</span>
      </a>
      <a href="#" class="nav-link disabled" title="3단계 예정">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        검수 큐
        <span class="nav-badge">SOON</span>
      </a>
    </nav>

    <div class="sidebar-stats">
      <div class="nav-label">DATA</div>
      <div class="stat-row">
        <span>벡터 DB</span>
        <span class="stat-value">24,962건</span>
      </div>
      <div class="stat-row">
        <span>데이터 소스</span>
        <span class="stat-value">9개</span>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="server-status">
        <div class="pulse-dot" id="statusDot"></div>
        <span id="serverStatus">연결 확인 중...</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Top bar -->
    <div class="topbar">
      <h1 class="page-title">유사 사례 검색</h1>
      <div class="topbar-right">
        <span class="date-display" id="dateDisplay"></span>
      </div>
    </div>

    <!-- Search input -->
    <div class="search-card">
      <div class="search-inner">
        <div class="search-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <textarea id="question" rows="3" placeholder="기술문의 내용을 입력하세요..."></textarea>
      </div>
      <div class="search-footer">
        <div class="search-options">
          <div class="opt">
            <label>버전</label>
            <select id="version">
              <option value="">전체</option>
              <option value="v5.0">v5.0</option>
              <option value="v4.0">v4.0</option>
              <option value="v3.5">v3.5</option>
            </select>
          </div>
          <div class="opt">
            <label>검색 수</label>
            <select id="topK">
              <option value="5">5건</option>
              <option value="8" selected>8건</option>
              <option value="12">12건</option>
            </select>
          </div>
        </div>
        <button id="searchBtn" onclick="doSearch()">
          <span class="btn-text">검색</span>
          <span class="btn-shortcut">Ctrl+Enter</span>
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loadingSection" class="loading-section hidden">
      <div class="loader">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
      </div>
      <p class="loading-text">RAG 벡터 검색 중...</p>
    </div>

    <!-- Classification result -->
    <div id="classifySection" class="classify-bar hidden">
      <div class="classify-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>자동 분류:</span>
        <strong id="classifyLabel"></strong>
      </div>
      <div class="classify-right">
        <span id="resultCount" class="result-count"></span>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsSection" class="results hidden">
      <div id="resultCards" class="result-grid"></div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <h3>기술문의 내용을 입력하면</h3>
      <p>24,962건의 데이터에서 유사 사례를 검색합니다</p>
      <div class="empty-sources">
        <span class="source-tag">Gmail</span>
        <span class="source-tag">W-Tech QNA</span>
        <span class="source-tag">Confluence</span>
        <span class="source-tag">API Guide</span>
        <span class="source-tag">FAQ</span>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
